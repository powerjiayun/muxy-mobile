name: Build iOS TIPA

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version, e.g. 0.3.1"
        required: true
        default: "0.3.1"
        type: string
      build_number:
        description: "Build number. Defaults to the GitHub run number."
        required: false
        default: ""
        type: string

jobs:
  build-tipa:
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_26.3.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.3.app
          elif [ -d /Applications/Xcode_26.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.2.app
          elif [ -d /Applications/Xcode.app ]; then
            sudo xcode-select -s /Applications/Xcode.app
          fi
          xcodebuild -version

      - name: Validate inputs
        id: validate
        run: |
          VERSION="${{ inputs.version }}"
          BUILD_NUMBER="${{ inputs.build_number }}"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must be X.Y.Z"
            exit 1
          fi

          if [[ -z "$BUILD_NUMBER" ]]; then
            BUILD_NUMBER="${{ github.run_number }}"
          fi

          if ! [[ "$BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Error: build_number must be numeric"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set app version
        env:
          VERSION: ${{ steps.validate.outputs.version }}
          BUILD_NUMBER: ${{ steps.validate.outputs.build_number }}
        run: |
          node -e '
            const fs = require("fs");
            const cfg = JSON.parse(fs.readFileSync("app.json", "utf8"));
            cfg.expo.version = process.env.VERSION;
            cfg.expo.ios = cfg.expo.ios || {};
            cfg.expo.ios.buildNumber = process.env.BUILD_NUMBER;
            fs.writeFileSync("app.json", JSON.stringify(cfg, null, 2) + "\n");
          '

      - name: Expo prebuild iOS
        run: npx expo prebuild --platform ios --no-install --clean --non-interactive

      - name: Ensure CocoaPods
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods --no-document
          fi
          pod --version

      - name: Install Pods
        working-directory: ios
        run: pod install

      - name: Build unsigned iOS app
        run: |
          xcodebuild \
            -workspace ios/Muxy.xcworkspace \
            -scheme Muxy \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath ios/build/tipa \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package TIPA
        run: |
          APP_PATH=$(find ios/build/tipa/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" -print -quit)

          if [ -z "$APP_PATH" ]; then
            echo "Error: .app not found"
            exit 1
          fi

          rm -rf dist ios/build/tipa/Payload
          mkdir -p dist ios/build/tipa/Payload
          cp -R "$APP_PATH" ios/build/tipa/Payload/Muxy.app

          cd ios/build/tipa
          zip -qry "../../../dist/Muxy-${{ steps.validate.outputs.version }}.tipa" Payload

      - name: Upload TIPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Muxy-${{ steps.validate.outputs.version }}-tipa
          path: dist/*.tipa
