name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (format: X.Y.Z)"
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      version_code: ${{ steps.v.outputs.version_code }}
    steps:
      - id: v
        run: |
          VERSION="${{ inputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must be X.Y.Z"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$(date +%s)" >> "$GITHUB_OUTPUT"

  ios:
    needs: validate
    uses: ./.github/workflows/ios-release.yml
    with:
      version: ${{ needs.validate.outputs.version }}
      skip_release_tag: true
    secrets: inherit

  android:
    needs: validate
    uses: ./.github/workflows/android-release.yml
    with:
      version_name: ${{ needs.validate.outputs.version }}
      version_code: ${{ needs.validate.outputs.version_code }}
      skip_release_tag: true
    secrets: inherit

  release:
    needs: [validate, ios, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect release assets
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          mkdir -p dist

          while IFS= read -r -d '' asset; do
            case "$asset" in
              *.aab) name="Muxy-${VERSION}-android.aab" ;;
              *.ipa) name="Muxy-${VERSION}-ios.ipa" ;;
              *.tipa) name="Muxy-${VERSION}-ios.tipa" ;;
              *) continue ;;
            esac

            cp "$asset" "dist/$name"
          done < <(find release-artifacts -type f \( -name "*.aab" -o -name "*.ipa" -o -name "*.tipa" \) -print0)

          shopt -s nullglob
          assets=(dist/*)
          if (( ${#assets[@]} == 0 )); then
            echo "Error: no release assets found in downloaded artifacts"
            find release-artifacts -maxdepth 4 -type f -print
            exit 1
          fi

          printf "Release assets:\n"
          printf "- %s\n" "${assets[@]}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          PREV_TAG=$(gh release list \
            --repo "${{ github.repository }}" \
            --limit 100 \
            --json tagName \
            -q '[.[] | select(.tagName | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))][0].tagName')

          if [[ -n "$PREV_TAG" ]]; then
            RANGE="$PREV_TAG..HEAD"
          else
            RANGE="HEAD"
          fi

          git log --no-merges --format='- %s' "$RANGE" > notes.md

          if [[ ! -s notes.md ]]; then
            echo "- No changes since ${PREV_TAG:-initial release}" > notes.md
          fi

          shopt -s nullglob
          ASSETS=(dist/*)
          TAG="v$VERSION"

          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              --repo "${{ github.repository }}" \
              "${ASSETS[@]}" \
              --clobber
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --notes-file notes.md \
              --target "${{ github.sha }}" \
              "${ASSETS[@]}"
          fi
